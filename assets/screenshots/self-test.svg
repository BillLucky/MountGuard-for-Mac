  <polygon points="460,190 432,174 432,206" fill="#60a5fa"/>
  <line x1="720" y1="190" x2="880" y2="190" stroke="#4ade80" stroke-width="6"/>
  <polygon points="880,190 852,174 852,206" fill="#4ade80"/>
  <text x="40" y="404" fill="#e5e7eb" font-size="26" font-family="Helvetica, Arial, sans-serif">Safe by design: no writes outside MountGuard's own hidden test folder.</text>
